name: Daily Trade Execution

on:
  schedule:
    - cron: '0 14 * * 1-5'   # 7:00 AM PT (14:00 UTC) Mon-Fri
  workflow_dispatch:           # Allow manual trigger from GitHub UI

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write           # Needed to push dashboard data

    steps:
      - name: Checkout latest model
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run analysis and execute trades
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_PAPER: ${{ secrets.ALPACA_PAPER }}
        run: python run_daily_analysis.py --execute

      - name: Commit dashboard data
        if: always()
        run: |
          git config user.email "aschumacherdesign@gmail.com"
          git config user.name "schu51"
          git add docs/data/
          git diff --staged --quiet || git commit -m "Dashboard data update [skip ci]"
          git push
