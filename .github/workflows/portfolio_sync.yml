name: Portfolio Sync

on:
  schedule:
    - cron: '0,30 13-22 * * 1-5'   # Every 30 min, 6 AM–3 PM PT (13–22 UTC), Mon–Fri
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    # Credentials at job level so every step inherits them
    env:
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      ALPACA_PAPER: ${{ secrets.ALPACA_PAPER }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify credentials are available
        run: |
          echo "ALPACA_API_KEY set: $( [ -n "$ALPACA_API_KEY" ] && echo YES || echo NO )"
          echo "ALPACA_SECRET_KEY set: $( [ -n "$ALPACA_SECRET_KEY" ] && echo YES || echo NO )"
          echo "ALPACA_PAPER: $ALPACA_PAPER"

      - name: Sync portfolio from Alpaca
        run: python portfolio_sync.py

      - name: Commit and push
        run: |
          git config user.email "aschumacherdesign@gmail.com"
          git config user.name "schu51"
          git add docs/data/latest.json
          git diff --staged --quiet && echo "Nothing to commit" && exit 0
          git commit -m "Portfolio sync [skip ci]"
          pushed=0
          for attempt in 1 2 3 4 5; do
            if git pull --rebase -X theirs origin main && git push; then pushed=1; break; fi
            echo "push attempt $attempt failed, retrying..."
            git rebase --abort 2>/dev/null || true
            sleep $((RANDOM % 4 + 2))
          done
          [ "$pushed" = "1" ] || { echo "::error::push failed after 5 attempts"; exit 1; }
