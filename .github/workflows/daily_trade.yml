name: Daily Trade Execution

on:
  schedule:
    - cron: '0 14 * * 1-5'   # 7:00 AM PT (14:00 UTC) Mon-Fri
  workflow_dispatch:           # Allow manual trigger from GitHub UI

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 20        # Extra time for screener (~3-5 min) + trading run
    permissions:
      contents: write

    steps:
      - name: Checkout latest model
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run momentum screener
        run: python screener.py
        # Writes docs/data/screener.json — RS-ranked candidates for the trading run.
        # If screener fails, trading run falls back to static DEFAULT_UNIVERSE.
        continue-on-error: true

      - name: Run analysis and execute trades
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_PAPER: ${{ secrets.ALPACA_PAPER }}
        run: python run_daily_analysis.py --execute

      - name: Commit dashboard + screener data
        if: always()
        run: |
          git config user.email "aschumacherdesign@gmail.com"
          git config user.name "schu51"
          git add docs/data/ docs/data/screener.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Dashboard + screener data update [skip ci]"
          pushed=0
          for attempt in 1 2 3 4 5; do
            if git pull --rebase -X theirs origin main && git push; then pushed=1; break; fi
            echo "push attempt $attempt failed, retrying..."
            git rebase --abort 2>/dev/null || true
            sleep $((RANDOM % 4 + 2))
          done
          [ "$pushed" = "1" ] || { echo "::error::push failed after 5 attempts"; exit 1; }
